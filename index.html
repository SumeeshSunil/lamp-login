<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
<link rel="stylesheet" href="style.css"></head>
<body class="light-off">
    <h3 id="lamp-tail" style="color: wheat; padding-right: 50px;">Click on the lamp tail</h3>
    <div class="container">
        <div class="lamp-section">
            <div class="lamp-shade">
                <div class="face">
                    <div class="eye"></div>
                    <div class="eye"></div>
                    <div class="mouth"></div>
                </div>
            </div>
            <div class="pull-string" id="toggle">
                <div class="string"></div>
                <div class="knob"></div>
            </div>
            <div style="width: 6px; height: 100px;background: #333;"></div>
            <div style="width: 70px; height: 10px; background: #333; border-radius: 5px;"></div>
        </div>
        <div class="login-card">
            <h2>Welcome back!</h2>
            <div class="-input-group">
                <label for="">Username</label>
                <input type="tel" name="" id="" placeholder="Username">
            </div>
            <div class="input-group">
                <label for="">Password</label>
                <input type="password" name="" id="" placeholder="Password">
            </div>
            <button>Login</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
